name: Quarterly signal

# Automated, hands-off run of the concentrated 13F-clone signal a few days after
# each quarterly 13F filing deadline (~45 days after quarter-end). It refreshes
# the data, emits the trade ticket, appends to the forward paper-trade log, and
# commits the updated log so the out-of-sample track record accumulates over
# time. NO orders are placed — this is a decision + record, not execution.

on:
  schedule:
    # 17th of Feb / May / Aug / Nov, 13:00 UTC (just after the 13F deadlines).
    - cron: "0 13 17 2,5,8,11 *"
  workflow_dispatch: {}  # allow manual runs

permissions:
  contents: write

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e .

      - name: Run quarterly signal
        env:
          WHALE_END_DATE: "2099-12-31"  # always include the latest filing
          WHALE_OPENFIGI_API_KEY: ${{ secrets.OPENFIGI_API_KEY }}
        run: |
          python -m whale_clone.paper --refresh | tee signal_report.txt
          mkdir -p reports
          cp .cache/paper_log.json reports/paper_log.json 2>/dev/null || true
          cp signal_report.txt reports/latest_signal.txt

      - name: Commit the updated paper-trade log
        run: |
          git config user.name "whale-clone-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore: quarterly signal + paper-trade log update"
          git push || echo "nothing to push"
